<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여행 날짜 정하기</title>
    <!-- Supabase JS 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Malgun Gothic', sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        h2 {
            color: #008080;
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: #a0a0a0;
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: #2c2c2c;
            color: #ffffff;
            border: 1px solid #333;
            border-radius: 6px;
            box-sizing: border-box;
            color-scheme: dark;
        }

        input:focus {
            outline: none;
            border-color: #008080;
        }

        .date-range {
            display: flex;
            gap: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #008080;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #006666;
        }

        hr {
            border: 0;
            height: 1px;
            background: #333;
            margin: 30px 0;
        }

        .result-list {
            list-style: none;
            padding: 0;
        }

        .result-item {
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #008080;
        }

        .result-name {
            font-weight: bold;
            font-size: 1.1em;
            color: #008080;
            margin-bottom: 5px;
        }

        .result-dates {
            font-size: 0.9em;
        }

        .loading {
            text-align: center;
            color: #a0a0a0;
            font-size: 0.9em;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>✈️ 여행 날짜 투표</h2>

        <div class="form-group">
            <label for="userName">이름</label>
            <input type="text" id="userName" placeholder="이름을 입력하세요 (예: 오현서)">
        </div>

        <div class="form-group date-range">
            <div style="flex: 1;">
                <label for="startDate">시작 가능일</label>
                <input type="date" id="startDate">
            </div>
            <div style="flex: 1;">
                <label for="endDate">종료 가능일</label>
                <input type="date" id="endDate">
            </div>
        </div>

        <button onclick="submitDate()" id="submitBtn">일정 등록하기</button>

        <hr>

        <h3>현황 보기</h3>
        <ul class="result-list" id="resultList">
            <li class="loading">데이터를 불러오는 중...</li>
        </ul>
    </div>

    <script>
        // Supabase 설정 (주석을 해제하고 실제 URL과 Key를 입력하세요)
        const SUPABASE_URL = 'https://pjurpobowfysoirqytsl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_f3AjW6dtCKw2Ofrdu9M2Ng_CMvFqatD';

        // Supabase 클라이언트 초기화
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let schedules = [];

        // 화면에 목록을 그려주는 함수
        function renderList() {
            const listElement = document.getElementById('resultList');
            listElement.innerHTML = '';

            if (schedules.length === 0) {
                listElement.innerHTML = '<li class="loading">등록된 일정이 없습니다.</li>';
                return;
            }

            schedules.forEach(schedule => {
                const li = document.createElement('li');
                li.className = 'result-item';
                li.innerHTML = `
                    <div class="result-name">${schedule.name}</div>
                    <div class="result-dates">🗓️ ${schedule.start_date} ~ ${schedule.end_date}</div>
                `;
                listElement.appendChild(li);
            });
        }

        // Supabase에서 데이터를 불러오는 함수
        async function fetchSchedules() {
            try {
                const { data, error } = await supabase
                    .from('travel_schedules')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                schedules = data;
                renderList();
            } catch (error) {
                console.error('Error fetching data:', error.message);
                document.getElementById('resultList').innerHTML = '<li class="loading">데이터를 불러오는데 실패했습니다.</li>';
            }
        }

        // 새 일정을 등록하는 함수
        async function submitDate() {
            const name = document.getElementById('userName').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const submitBtn = document.getElementById('submitBtn');

            if (!name || !startDate || !endDate) {
                alert('이름과 날짜를 모두 입력해주세요.');
                return;
            }

            if (startDate > endDate) {
                alert('종료일이 시작일보다 빠를 수 없습니다.');
                return;
            }

            // 버튼 비활성화 (중복 클릭 방지)
            submitBtn.disabled = true;
            submitBtn.innerText = '등록 중...';

            try {
                // Supabase에 데이터 삽입
                const { data, error } = await supabase
                    .from('travel_schedules')
                    .insert([
                        { name: name, start_date: startDate, end_date: endDate }
                    ]);

                if (error) throw error;

                // 데이터 재조회 및 렌더링
                await fetchSchedules();

                // 입력창 초기화
                document.getElementById('userName').value = '';
                document.getElementById('startDate').value = '';
                document.getElementById('endDate').value = '';
            } catch (error) {
                console.error('Error inserting data:', error.message);
                alert('일정 등록에 실패했습니다. 관리자에게 문의하세요.');
            } finally {
                // 버튼 활성화
                submitBtn.disabled = false;
                submitBtn.innerText = '일정 등록하기';
            }
        }

        // 페이지 로드 시 초기 데이터 불러오기
        fetchSchedules();
    </script>
</body>

</html>
