<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여행 날짜 정하기</title>
    <!-- Supabase JS 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box; /* 모바일 그리드 오버플로우 방지 */
        }
        body {
            /* 배경 이미지 설정 */
            background-color: #121212;
            background-image: url('./bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e0e0e0;
            font-family: 'Malgun Gothic', sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 600px;
            /* 반투명한 검은색 박스 및 블러 효과 (Glassmorphism) */
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h2 {
            color: #008080;
            text-align: center;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: #a0a0a0;
        }
        .status-options {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 5px;
        }
        .status-options label {
            display: inline;
            margin: 0;
            cursor: pointer;
            color: #e0e0e0;
        }
        input[type="text"], input[type="date"] {
            width: 100%;
            padding: 12px;
            background-color: #2c2c2c;
            color: #ffffff;
            border: 1px solid #333;
            border-radius: 6px;
            color-scheme: dark;
        }
        input[type="text"]:focus, input[type="date"]:focus {
            outline: none;
            border-color: #008080;
        }
        .date-range {
            display: flex;
            gap: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #008080;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #006666;
        }
        button:disabled {
            background-color: #444;
            color: #888;
            cursor: not-allowed;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        #cancelBtn {
            background-color: #555;
            display: none;
        }
        #cancelBtn:hover {
            background-color: #444;
        }
        hr {
            border: 0;
            height: 1px;
            background: #333;
            margin: 30px 0;
        }
        .result-list {
            list-style: none;
            padding: 0;
        }
        .result-item {
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #008080;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .result-info {
            flex: 1;
        }
        .result-name {
            font-weight: bold;
            font-size: 1.1em;
            color: #008080;
            margin-bottom: 5px;
        }
        .status-badge {
            font-size: 0.8em;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
            background-color: #333;
            color: #ccc;
        }
        .status-badge.미정 {
            background-color: #5a4b12;
            color: #ffd43b;
        }
        .status-badge.불참 {
            background-color: #5a1212;
            color: #ff6b6b;
        }
        .result-dates {
            font-size: 0.9em;
        }
        .edit-btn, .delete-btn {
            padding: 6px 12px;
            font-size: 0.8em;
            width: auto;
            border: 1px solid #555;
            cursor: pointer;
            color: white;
            border-radius: 4px;
        }
        .edit-btn { background-color: #333; }
        .edit-btn:hover { background-color: #444; }
        .delete-btn { background-color: #7a1c1c; margin-left: 5px; }
        .delete-btn:hover { background-color: #9c2727; }
        .loading {
            text-align: center;
            color: #a0a0a0;
            font-size: 0.9em;
        }

        /* 달력 스타일 */
        .calendar-container {
            margin-top: 30px;
            background-color: #2a2a2a;
            border-radius: 8px;
            padding: 15px;
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .calendar-header button {
            width: auto;
            padding: 5px 10px;
            background-color: #333;
            border: 1px solid #555;
        }
        .calendar-header h3 {
            margin: 0;
            color: #e0e0e0;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        .calendar-day-header {
            text-align: center;
            font-size: 0.85em;
            color: #a0a0a0;
            font-weight: bold;
            padding-bottom: 5px;
        }
        .calendar-day-header:first-child { color: #ff6b6b; } 
        .calendar-day-header:last-child { color: #4dabf7; } 
        
        .calendar-cell {
            background-color: #1e1e1e;
            border-radius: 4px;
            min-height: 80px;
            padding: 5px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0; /* 중요: 그리드 셀이 내용물 때문에 넓어지는 것 방지 */
        }
        .calendar-date {
            font-size: 0.8em;
            color: #e0e0e0;
            margin-bottom: 5px;
            text-align: right;
        }
        .calendar-cell.other-month .calendar-date {
            color: #555;
        }
        .schedule-bar {
            background-color: #008080;
            color: white;
            font-size: 0.7em;
            padding: 2px 4px;
            border-radius: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 모바일 반응형 처리 */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 20px;
            }
            .calendar-container {
                padding: 10px;
            }
            .calendar-cell {
                padding: 2px;
                min-height: 60px;
            }
            .calendar-date {
                font-size: 0.7em;
            }
            .calendar-day-header {
                font-size: 0.75em;
            }
            .schedule-bar {
                font-size: 0.65em;
                padding: 1px 3px;
            }
            .status-options {
                font-size: 0.9em;
            }
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>✈️ 여행 날짜 투표</h2>
        
        <div class="form-group">
            <label for="userName">이름</label>
            <input type="text" id="userName" placeholder="이름을 입력하세요 (예: 오현서)">
        </div>

        <div class="form-group">
            <label>참석 상태</label>
            <div class="status-options">
                <label>
                    <input type="radio" name="status" value="참석" checked onchange="toggleDateInputs()"> 참석 (날짜 입력)
                </label>
                <label>
                    <input type="radio" name="status" value="미정" onchange="toggleDateInputs()"> 미정
                </label>
                <label>
                    <input type="radio" name="status" value="불참" onchange="toggleDateInputs()"> 불참
                </label>
            </div>
        </div>

        <div class="form-group date-range" id="dateInputGroup">
            <div style="flex: 1;">
                <label for="startDate">시작 가능일</label>
                <input type="date" id="startDate">
            </div>
            <div style="flex: 1;">
                <label for="endDate">종료 가능일</label>
                <input type="date" id="endDate">
            </div>
        </div>

        <div class="btn-group">
            <button onclick="submitDate()" id="submitBtn">일정 등록하기</button>
            <button onclick="cancelEdit()" id="cancelBtn">수정 취소</button>
        </div>

        <hr>

        <h3>달력 뷰</h3>
        <div class="calendar-container">
            <div class="calendar-header">
                <button onclick="changeMonth(-1)">◀ 이전</button>
                <h3 id="calendarTitle">2026년 7월</h3>
                <button onclick="changeMonth(1)">다음 ▶</button>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                <!-- 달력 내용이 렌더링 됩니다 -->
            </div>
        </div>

        <hr>

        <h3>현황 보기</h3>
        <div id="bestDateContainer"></div>
        <ul class="result-list" id="resultList">
            <li class="loading">데이터를 불러오는 중...</li>
        </ul>
    </div>

    <script>
        // Supabase 설정
        const SUPABASE_URL = 'https://pjurpobowfysoirqytsl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_f3AjW6dtCKw2Ofrdu9M2Ng_CMvFqatD';
        
        // Supabase 클라이언트 초기화
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let schedules = [];
        let editingId = null;

        // 달력 상태
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth(); // 0 ~ 11

        // 상태 선택에 따른 날짜 입력란 토글
        function toggleDateInputs() {
            const status = document.querySelector('input[name="status"]:checked').value;
            const dateGroup = document.getElementById('dateInputGroup');
            if (status === '참석') {
                dateGroup.style.display = 'flex';
            } else {
                dateGroup.style.display = 'none';
                document.getElementById('startDate').value = '';
                document.getElementById('endDate').value = '';
            }
        }

        // 화면에 목록을 그려주는 함수
        function renderList() {
            const listElement = document.getElementById('resultList');
            listElement.innerHTML = ''; 

            if (schedules.length === 0) {
                listElement.innerHTML = '<li class="loading">등록된 일정이 없습니다.</li>';
                return;
            }

            schedules.forEach(schedule => {
                const li = document.createElement('li');
                li.className = 'result-item';
                
                const dbStatus = schedule.status || '참석';
                let dateHtml = '';
                if (dbStatus === '참석' && schedule.start_date && schedule.end_date) {
                    dateHtml = `<div class="result-dates">🗓️ ${schedule.start_date} ~ ${schedule.end_date}</div>`;
                }
                
                let badgeClass = dbStatus === '참석' ? '' : `status-badge ${dbStatus}`;
                let badgeHtml = dbStatus === '참석' ? '' : `<span class="${badgeClass}">${dbStatus}</span>`;

                li.innerHTML = `
                    <div class="result-info">
                        <div class="result-name">${schedule.name} ${badgeHtml}</div>
                        ${dateHtml}
                    </div>
                    <div>
                        <button class="edit-btn" onclick="startEdit(${schedule.id})">수정</button>
                        <button class="delete-btn" onclick="deleteSchedule(${schedule.id})">삭제</button>
                    </div>
                `;
                listElement.appendChild(li);
            });
        }

        // 달력을 렌더링하는 함수
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const title = document.getElementById('calendarTitle');
            
            grid.innerHTML = '';
            title.innerText = `${currentYear}년 ${currentMonth + 1}월`;

            const days = ['일', '월', '화', '수', '목', '금', '토'];
            days.forEach(day => {
                const dayHeader = document.createElement('div');
                dayHeader.className = 'calendar-day-header';
                dayHeader.innerText = day;
                grid.appendChild(dayHeader);
            });

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const prevMonthDays = new Date(currentYear, currentMonth, 0).getDate();

            for (let i = firstDay - 1; i >= 0; i--) {
                const cell = createCalendarCell(prevMonthDays - i, true, new Date(currentYear, currentMonth - 1, prevMonthDays - i));
                grid.appendChild(cell);
            }
            for (let i = 1; i <= daysInMonth; i++) {
                const cell = createCalendarCell(i, false, new Date(currentYear, currentMonth, i));
                grid.appendChild(cell);
            }
            const totalCells = firstDay + daysInMonth;
            const nextDays = 42 - totalCells;
            for (let i = 1; i <= nextDays; i++) {
                const cell = createCalendarCell(i, true, new Date(currentYear, currentMonth + 1, i));
                grid.appendChild(cell);
            }
        }

        // 달력 셀(칸) 하나를 생성하는 함수
        function createCalendarCell(dateNum, isOtherMonth, cellDate) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell' + (isOtherMonth ? ' other-month' : '');
            
            const dateStrDiv = document.createElement('div');
            dateStrDiv.className = 'calendar-date';
            dateStrDiv.innerText = dateNum;
            cell.appendChild(dateStrDiv);

            const year = cellDate.getFullYear();
            const month = String(cellDate.getMonth() + 1).padStart(2, '0');
            const day = String(cellDate.getDate()).padStart(2, '0');
            const cellDateString = `${year}-${month}-${day}`;

            // '참석' 상태이면서 날짜가 유효한 사람만 달력에 표시
            const attendingSchedules = schedules.filter(s => (!s.status || s.status === '참석') && s.start_date && s.end_date);
            
            attendingSchedules.forEach((schedule, index) => {
                if (cellDateString >= schedule.start_date && cellDateString <= schedule.end_date) {
                    const bar = document.createElement('div');
                    bar.className = 'schedule-bar';
                    const hue = (index * 137.5) % 360; 
                    bar.style.backgroundColor = `hsl(${hue}, 70%, 40%)`;
                    bar.innerText = schedule.name;
                    cell.appendChild(bar);
                }
            });

            return cell;
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            } else if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
        }

        // 가장 많이 겹치는 일정을 계산하여 렌더링하는 함수
        function renderBestDates() {
            const container = document.getElementById('bestDateContainer');
            // '참석' 상태인 사람만 대상으로 계산
            const attendingSchedules = schedules.filter(s => (!s.status || s.status === '참석') && s.start_date && s.end_date);
            
            if (attendingSchedules.length === 0) {
                container.innerHTML = '';
                return;
            }
            
            const dateCounts = {};
            attendingSchedules.forEach(schedule => {
                let current = new Date(schedule.start_date);
                const end = new Date(schedule.end_date);
                
                while (current <= end) {
                    const dateStr = current.toISOString().split('T')[0];
                    dateCounts[dateStr] = (dateCounts[dateStr] || 0) + 1;
                    current.setDate(current.getDate() + 1);
                }
            });
            
            let maxCount = 0;
            for (const count of Object.values(dateCounts)) {
                if (count > maxCount) maxCount = count;
            }
            
            if (maxCount < 2) {
                container.innerHTML = '';
                return; 
            }
            
            const bestDates = Object.keys(dateCounts)
                .filter(date => dateCounts[date] === maxCount)
                .sort();
                
            let grouped = [];
            if (bestDates.length > 0) {
                let tempRange = [bestDates[0]];
                for (let i = 1; i < bestDates.length; i++) {
                    const prevDate = new Date(bestDates[i-1]);
                    const currDate = new Date(bestDates[i]);
                    const diffDays = Math.round((currDate - prevDate) / (1000 * 60 * 60 * 24)); 
                    
                    if (diffDays === 1) {
                        tempRange.push(bestDates[i]);
                    } else {
                        grouped.push(tempRange);
                        tempRange = [bestDates[i]];
                    }
                }
                grouped.push(tempRange);
            }
            
            const formattedRanges = grouped.map(range => {
                if (range.length === 1) return range[0];
                return `${range[0]} ~ ${range[range.length - 1]}`;
            });
            
            container.innerHTML = `
                <div style="background-color: rgba(0, 128, 128, 0.85); color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.2);">
                    <h4 style="margin: 0 0 10px 0; color: #fff;">🏆 가장 많이 겹치는 추천 일정 (${maxCount}명 가능)</h4>
                    <div style="font-size: 1.1em; font-weight: bold;">
                        ${formattedRanges.join(', ')}
                    </div>
                </div>
            `;
        }

        // Supabase에서 데이터를 불러오는 함수
        async function fetchSchedules() {
            try {
                const { data, error } = await supabaseClient
                    .from('travel_schedules')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                
                schedules = data;
                renderList();
                renderCalendar();
                renderBestDates();
            } catch (error) {
                console.error('Error fetching data:', error.message);
                document.getElementById('resultList').innerHTML = '<li class="loading">데이터를 불러오는데 실패했습니다.</li>';
            }
        }

        // 수정 모드 시작
        function startEdit(id) {
            const schedule = schedules.find(s => s.id === id);
            if (!schedule) return;

            editingId = id;
            document.getElementById('userName').value = schedule.name;
            
            const status = schedule.status || '참석';
            document.querySelector(`input[name="status"][value="${status}"]`).checked = true;
            toggleDateInputs();
            
            if (status === '참석') {
                document.getElementById('startDate').value = schedule.start_date || '';
                document.getElementById('endDate').value = schedule.end_date || '';
            }

            document.getElementById('submitBtn').innerText = '일정 수정하기';
            document.getElementById('cancelBtn').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 수정 모드 취소
        function cancelEdit() {
            editingId = null;
            document.getElementById('userName').value = '';
            document.querySelector(`input[name="status"][value="참석"]`).checked = true;
            toggleDateInputs();
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            
            document.getElementById('submitBtn').innerText = '일정 등록하기';
            document.getElementById('cancelBtn').style.display = 'none';
        }

        // 일정 삭제 함수
        async function deleteSchedule(id) {
            if (!confirm('정말로 이 일정을 삭제하시겠습니까?')) {
                return;
            }

            try {
                const { error } = await supabaseClient
                    .from('travel_schedules')
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                
                await fetchSchedules();
            } catch (error) {
                console.error('Error deleting data:', error.message);
                alert('일정 삭제에 실패했습니다. 관리자에게 문의하세요.');
            }
        }

        // 새 일정을 등록하거나 기존 일정을 수정하는 함수
        async function submitDate() {
            const name = document.getElementById('userName').value;
            const status = document.querySelector('input[name="status"]:checked').value;
            let startDate = document.getElementById('startDate').value;
            let endDate = document.getElementById('endDate').value;
            const submitBtn = document.getElementById('submitBtn');

            if (!name) {
                alert('이름을 입력해주세요.');
                return;
            }
            
            if (status === '참석') {
                if (!startDate || !endDate) {
                    alert('참석일 경우 시작일과 종료일을 모두 선택해야 합니다.');
                    return;
                }
                if (startDate > endDate) {
                    alert('종료일이 시작일보다 빠를 수 없습니다.');
                    return;
                }
            } else {
                startDate = null;
                endDate = null;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = editingId ? '수정 중...' : '등록 중...';

            const payload = { 
                name: name, 
                status: status,
                start_date: startDate, 
                end_date: endDate 
            };

            try {
                if (editingId) {
                    const { error } = await supabaseClient
                        .from('travel_schedules')
                        .update(payload)
                        .eq('id', editingId);

                    if (error) throw error;
                } else {
                    const { error } = await supabaseClient
                        .from('travel_schedules')
                        .insert([payload]);

                    if (error) throw error;
                }

                cancelEdit();
                await fetchSchedules();
            } catch (error) {
                console.error('Error saving data:', error.message);
                alert('일정 저장에 실패했습니다. 관리자에게 문의하세요.');
            } finally {
                submitBtn.disabled = false;
                if (!editingId) {
                    submitBtn.innerText = '일정 등록하기';
                }
            }
        }

        // 페이지 로드 시 초기 데이터 불러오기
        fetchSchedules();
    </script>
</body>
</html>
